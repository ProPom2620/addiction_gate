<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADDICTION WARNING</title>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ff0000; }
            to { text-shadow: 0 0 40px #ff0000; }
        }
        body { font-family: 'Arial Black', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; width: 90%; }
        .warning-text { font-size: 3rem; animation: shake 0.5s infinite; }
        .drug-text { color: #ff0000; font-size: 4.5rem; animation: glow 1s infinite alternate; }
        .timer { font-size: 8rem; color: #ff0000; animation: shake 0.2s infinite; }
        #goBtn { padding: 20px 50px; font-size: 1.5rem; background: #ff0000; color: #fff; border: none; display: none; position: fixed; font-weight: bold; }
        .status { margin-top: 20px; color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-text">
            WARNING!<br> THIS SITE IS A<br>
            <span id="levelText" class="drug-text">CLASS ? DRUG</span><br>
            STAY FOCUSED
        </div>
        <div id="timer" class="timer">--</div>
        <button id="goBtn" onclick="handleButtonClick()">ENTER</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const level = urlParams.get('level') || 'C';
        let timeLeft = parseInt(urlParams.get('time')) || 10;
        
        document.getElementById('levelText').textContent = `CLASS ${level} DRUG`;
        
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('goBtn');
        const statusDisplay = document.getElementById('status');
        let clickCount = 0;

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.style.display = 'none';
                showButton();
            }
        }, 1000);

        function handleButtonClick() {
            clickCount++;
            btn.style.display = 'none';
            if (clickCount < 10) {
                statusDisplay.textContent = `VERIFICATION (${clickCount}/10)`;
                setTimeout(showButton, 200);
            } else {
                const returnUrl = urlParams.get('return') || 'https://www.google.com';
                window.location.href = returnUrl + (returnUrl.includes('?') ? '&' : '?') + 'pass=true';
            }
        }

        function showButton() {
            btn.style.left = (Math.random() * (window.innerWidth - 200) + 100) + 'px';
            btn.style.top = (Math.random() * (window.innerHeight - 200) + 100) + 'px';
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
