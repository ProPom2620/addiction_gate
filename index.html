<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADDICTION WARNING</title>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
        }

        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .container { text-align: center; width: 90%; }

        .warning-text { 
            font-size: 3rem; line-height: 1.2; margin-bottom: 2rem;
            animation: shake 0.5s infinite; 
        }

        /* 預設 Drug 文字改為白色 */
        .drug-label { color: #fff; font-weight: 900; font-size: 4.5rem; }

        /* 等級字母專屬顏色 */
        .level-letter {
            font-size: 5.5rem;
            font-weight: 900;
            animation: glow 1s ease-in-out infinite alternate;
        }

        /* 顏色定義 */
        .color-A { color: #ff0000; } /* 紅色 */
        .color-B { color: #ff8c00; } /* 橘色 */
        .color-C { color: #ffff00; } /* 黃色 */

        .site-name { color: #fff; text-decoration: underline; }

        .timer { font-size: 8rem; animation: shake 0.2s infinite; }
        
        #goBtn {
            padding: 20px 50px; font-size: 1.5rem; 
            background-color: #fff; color: #000; /* 按鈕改回簡約白 */
            border: none; display: none; position: fixed; font-weight: bold;
        }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="warning-text">
            BEWARE!<br>
            <span id="targetSite" class="site-name">SITE</span> IS A<br>
            <span class="drug-label">CLASS <span id="levelLetter" class="level-letter">?</span> DRUG</span><br>
            REMEMBER YOUR PURPOSE
        </div>

        <div id="timer" class="timer">--</div>
        
        <button id="goBtn" onclick="handleButtonClick()">ENTER</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const level = (urlParams.get('level') || 'C').toUpperCase();
        let timeLeft = parseInt(urlParams.get('time')) || 10;
        const returnUrl = urlParams.get('return') || '';

        // 1. 處理網站名稱
        function getSiteName(url) {
            try {
                if (!url) return "THIS SITE";
                const domain = new URL(url).hostname;
                const parts = domain.split('.');
                return (parts.length > 2 ? parts[parts.length - 2] : parts[0]).toUpperCase();
            } catch (e) { return "THIS SITE"; }
        }

        // 2. 應用等級顏色
        const levelElement = document.getElementById('levelLetter');
        levelElement.textContent = level;
        
        // 根據等級加入對應的 CSS class
        if (['A', 'B', 'C'].includes(level)) {
            levelElement.classList.add(`color-${level}`);
            // 計時器也同步顏色，增加直覺感
            document.getElementById('timer').classList.add(`color-${level}`);
            document.getElementById('status').classList.add(`color-${level}`);
        }

        document.getElementById('targetSite').textContent = getSiteName(returnUrl);

        // --- 邏輯保持不變 ---
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('goBtn');
        const statusDisplay = document.getElementById('status');
        let clickCount = 0;

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.style.display = 'none';
                showButton();
                statusDisplay.textContent = `VERIFICATION: ${clickCount}/10`;
            }
        }, 1000);

        function handleButtonClick() {
            clickCount++;
            btn.style.display = 'none'; 
            if (clickCount < 10) {
                statusDisplay.textContent = `VERIFICATION: ${clickCount}/10`;
                setTimeout(showButton, 200); 
            } else {
                window.location.href = returnUrl + (returnUrl.includes('?') ? '&' : '?') + 'pass=true';
            }
        }

        function showButton() {
            const padding = 150;
            btn.style.left = (Math.random() * (window.innerWidth - padding * 2) + padding) + 'px';
            btn.style.top = (Math.random() * (window.innerHeight - padding * 2) + padding) + 'px';
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
