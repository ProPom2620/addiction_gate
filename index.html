<!DOCTYPE html>
<html lang="en">
<head>

    <title>ADDICTION WARNING</title>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
        }

        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .container { text-align: center; width: 90%; }

        .warning-text { 
            font-size: 3rem; line-height: 1.2; margin-bottom: 2rem;
            animation: shake 0.5s infinite; 
        }

        /* 預設 Drug 文字改為白色 */
        .drug-label { color: #fff; font-weight: 900; font-size: 4.5rem; }

        /* 等級字母專屬顏色 */
        .level-letter {
            font-size: 5.5rem;
            font-weight: 900;
            animation: glow 1s ease-in-out infinite alternate;
        }

        /* 顏色定義 */
        .color-A { color: #ff0000; } /* 紅色 */
        .color-B { color: #ff8c00; } /* 橘色 */
        .color-C { color: #ffff00; } /* 黃色 */

        .site-name { color: #fff; text-decoration: underline; }

        .timer { font-size: 8rem; animation: shake 0.2s infinite; }
        
        #goBtn {
            padding: 20px 50px; font-size: 1.5rem; 
            background-color: #fff; color: #000; /* 按鈕改回簡約白 */
            border: none; display: none; position: fixed; font-weight: bold;
        }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
