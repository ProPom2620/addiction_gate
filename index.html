<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進入 YouTube 前的最後警告</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #000; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* 防止按鈕噴到視窗外產生捲軸 */
        }
        .container { text-align: center; width: 90%; max-width: 600px; }
        .warning-text { font-size: 1.5rem; line-height: 1.8; margin-bottom: 2rem; }
        .drug-text { color: #ff0000; font-weight: bold; font-size: 1.8rem; }
        .timer { font-size: 3rem; color: #555; margin: 1rem 0; }
        
        #goBtn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: none; /* 初始隱藏 */
            position: relative;
            transition: 0.1s;
            font-weight: bold;
        }
        .status { margin-top: 10px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="warning-text">
            小心，YouTube 是<span class="drug-text">一級毒品</span><br>
            請詳記自己要幹嘛
        </div>

        <div id="timer" class="timer">10</div>
        
        <button id="goBtn" onclick="handleButtonClick()">進入</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        let timeLeft = 10;
        let clickCount = 0;
        const totalSteps = 10;
        
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('goBtn');
        const statusDisplay = document.getElementById('status');

        // 1. 倒數計時邏輯
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.style.display = 'none';
                btn.style.display = 'inline-block';
                statusDisplay.textContent = `請完成最後驗證：點擊按鈕 10 次 (0/${totalSteps})`;
            }
        }, 1000);

        // 2. 按鈕點擊與隨機傳送邏輯
        function handleButtonClick() {
            clickCount++;
            
            if (clickCount < totalSteps) {
                moveButton();
                statusDisplay.textContent = `請完成最後驗證：點擊按鈕 10 次 (${clickCount}/${totalSteps})`;
            } else {
                grantAccess();
            }
        }

        function moveButton() {
            // 計算視窗範圍，扣除按鈕寬高避免切掉
            const padding = 100;
            const x = Math.random() * (window.innerWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - padding * 2) + padding;
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // 3. 授權跳轉
        function grantAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const returnUrl = urlParams.get('return') || 'https://www.youtube.com';
            const separator = returnUrl.includes('?') ? '&' : '?';
            window.location.href = returnUrl + separator + 'pass=true';
        }
    </script>
</body>
</html>
