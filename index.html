<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADDICTION WARNING - EXTREME COLOR</title>
    <style>
        /* 基礎背景與文字設定 */
        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* 劇烈震動動畫 */
        @keyframes violent-shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-4px, -2px) rotate(-2deg); }
            40% { transform: translate(4px, 2px) rotate(2deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            80% { transform: translate(-2px, -2px) rotate(2deg); }
            100% { transform: translate(2px, -4px) rotate(-2deg); }
        }

        /* 強力發光動畫 */
        @keyframes intense-glow {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 40px currentColor, 0 0 70px currentColor; }
        }

        .container { text-align: center; width: 90%; }

        /* 一般警告文字（輕微震動） */
        .warning-text { 
            font-size: 3rem; line-height: 1.2; margin-bottom: 1.5rem;
            animation: violent-shake 0.5s infinite; 
        }

        /* 網站名稱與等級字母：重點強化區域 */
        .critical-focus {
            font-weight: 900;
            text-decoration: none; /* 去除底線 */
            animation: violent-shake 0.1s infinite, intense-glow 0.3s ease-in-out infinite alternate;
        }

        #targetSite { font-size: 4.5rem; }
        #levelLetter { font-size: 6rem; }

        .drug-label { color: #fff; font-weight: 900; font-size: 4rem; }

        /* 顏色定義 */
        .color-A { color: #ff0000 !important; } /* 紅色 */
        .color-B { color: #ff8c00 !important; } /* 橘色 */
        .color-C { color: #ffff00 !important; } /* 黃色 */

        .timer { font-size: 8rem; animation: violent-shake 0.2s infinite; }
        
        #goBtn {
            padding: 20px 50px; font-size: 1.5rem; 
            background-color: #fff; color: #000;
            border: none; display: none; position: fixed; font-weight: bold;
            box-shadow: 0 0 30px #fff; cursor: pointer;
        }
        .status { margin-top: 20px; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="warning-text">
            BEWARE!<br>
            <span id="targetSite" class="critical-focus">SITE</span> IS A<br>
            <span class="drug-label">CLASS <span id="levelLetter" class="critical-focus">?</span> DRUG</span><br>
            REMEMBER YOUR PURPOSE
        </div>

        <div id="timer" class="timer">--</div>
        
        <button id="goBtn" onclick="handleButtonClick()">ENTER</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const level = (urlParams.get('level') || 'C').toUpperCase();
        let timeLeft = parseInt(urlParams.get('time')) || 10;
        const returnUrl = urlParams.get('return') || '';

        const levelEl = document.getElementById('levelLetter');
        const siteEl = document.getElementById('targetSite');
        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');

        // 1. 處理網站名稱
        function getSiteName(url) {
            try {
                if (!url) return "THIS SITE";
                const domain = new URL(decodeURIComponent(url)).hostname;
                const parts = domain.split('.');
                return (parts.length > 2 ? parts[parts.length - 2] : parts[0]).toUpperCase();
            } catch (e) { return "THIS SITE"; }
        }
        siteEl.textContent = getSiteName(returnUrl);
        levelEl.textContent = level;

        // 2. 套用顏色到網站名、等級與計時器
        if (['A', 'B', 'C'].includes(level)) {
            const colorClass = `color-${level}`;
            siteEl.classList.add(colorClass);
            levelEl.classList.add(colorClass);
            timerEl.classList.add(colorClass);
            statusEl.classList.add(colorClass);
        }

        // 3. 倒數邏輯
        let clickCount = 0;
        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerEl.style.display = 'none';
                showButton();
                statusEl.textContent = `VERIFICATION: ${clickCount}/10`;
            }
        }, 1000);

        function handleButtonClick() {
            clickCount++;
            document.getElementById('goBtn').style.display = 'none'; 
            if (clickCount < 10) {
                statusEl.textContent = `VERIFICATION: ${clickCount}/10`;
                setTimeout(showButton, 200); 
            } else {
                window.location.href = returnUrl + (returnUrl.includes('?') ? '&' : '?') + 'pass=true';
            }
        }

        function showButton() {
            const btn = document.getElementById('goBtn');
            const padding = 150;
            btn.style.left = (Math.random() * (window.innerWidth - padding * 2) + padding) + 'px';
            btn.style.top = (Math.random() * (window.innerHeight - padding * 2) + padding) + 'px';
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
